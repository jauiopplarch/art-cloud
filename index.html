<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Art Cloud - Pixel Gradient Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --bg-normal: url('https://i.pinimg.com/originals/68/e3/0c/68e30c98e0c864a77c16a278a49bb230.gif');
            --bg-detect: url('https://i.pinimg.com/originals/be/a5/92/bea592a7b560760b909ca3cded061531.gif');
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Press Start 2P', cursive;
            background: var(--bg-normal) no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background 0.1s steps(2);
        }

        body.file-detected { background: var(--bg-detect) no-repeat center center fixed; background-size: cover; }

        /* Bulle avec dégradé PIXELISÉ (bandes de couleurs nettes) */
        .art-bubble {
            position: relative;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 8px solid #fff;
            box-shadow: 0 0 0 6px rgba(0,0,0,0.2);
            transition: transform 0.2s steps(4);
            
            /* Le secret du dégradé pixelisé : des "hard stops" */
            background: radial-gradient(circle, 
                #ffffff 0%, #ffffff 30%, 
                #ffb3c1 30%, #ffb3c1 60%, 
                #ff85a2 60%, #ff85a2 85%, 
                #ff4d6d 85%, #ff4d6d 100%);
        }

        /* Overlay de texture pixel pour "casser" le lissage */
        .art-bubble::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            background-image: radial-gradient(rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 4px 4px; /* Taille des pixels */
            pointer-events: none;
        }

        /* Version VERTE pixelisée lors du survol/drag */
        .art-bubble.dragover {
            transform: scale(1.1);
            border-color: #43b581;
            background: radial-gradient(circle, 
                #ccffdd 0%, #ccffdd 30%, 
                #81e6a5 30%, #81e6a5 60%, 
                #43b581 60%, #43b581 85%, 
                #2d7d5a 85%, #2d7d5a 100%);
        }

        .art-bubble h1 {
            color: white;
            font-size: 16px;
            text-align: center;
            text-shadow: 3px 3px 0px #000;
            z-index: 3;
            pointer-events: none;
        }

        /* Bouton et Galerie */
        nav { position: fixed; top: 20px; right: 20px; z-index: 10; }
        .btn-view {
            background: #ff85a2; color: white; padding: 15px; border: 4px solid #fff;
            font-family: 'Press Start 2P', cursive; font-size: 10px; cursor: pointer;
        }
        .btn-view:hover { background: #43b581; }

        #galerie-page {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; padding: 40px; overflow-y: auto;
        }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; margin-top: 30px; }
        .grid img { width: 100%; border: 4px solid #43b581; image-rendering: pixelated; }

    </style>
</head>
<body id="main-body">

    <nav><button class="btn-view" onclick="toggleGalerie()">Voir tous les projets</button></nav>

    <div class="art-bubble" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <h1>ART<br>CLOUD</h1>
        <input type="file" id="file-input" hidden accept="image/*">
    </div>

    <div id="galerie-page">
        <h1 style="color: #43b581;">PROJETS PNG</h1>
        <button class="btn-view" onclick="toggleGalerie()" style="background:#43b581">RETOUR</button>
        <div class="grid" id="art-grid"></div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const body = document.getElementById('main-body');
        const artGrid = document.getElementById('art-grid');

        window.addEventListener('dragover', (e) => { e.preventDefault(); body.classList.add('file-detected'); });
        window.addEventListener('dragleave', (e) => { if (!e.relatedTarget) body.classList.remove('file-detected'); });

        dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            body.classList.remove('file-detected');
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        document.getElementById('file-input').addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(files) {
            for (let file of files) {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        artGrid.appendChild(img);
                    };
                    reader.readAsDataURL(file);
                }
            }
        }

        function toggleGalerie() {
            const gal = document.getElementById('galerie-page');
            gal.style.display = (gal.style.display === 'block') ? 'none' : 'block';
        }
    </script>
</body>
</html>
