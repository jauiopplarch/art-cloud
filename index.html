<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Art Cloud - Live Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --bg-normal: url('https://i.pinimg.com/originals/68/e3/0c/68e30c98e0c864a77c16a278a49bb230.gif');
            --bg-detect: url('https://i.pinimg.com/originals/be/a5/92/bea592a7b560760b909ca3cded061531.gif');
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Press Start 2P', cursive;
            background: var(--bg-normal) no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        body.file-detected { background: var(--bg-detect) no-repeat center center fixed; background-size: cover; }

        .art-bubble {
            position: relative; width: 280px; height: 280px; border-radius: 50%;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            border: 8px solid #fff; transition: transform 0.2s steps(4);
            background: radial-gradient(circle, #fff 0%, #fff 30%, #ffb3c1 30%, #ffb3c1 60%, #ff85a2 60%, #ff85a2 85%, #ff4d6d 85%, #ff4d6d 100%);
        }

        .art-bubble.dragover {
            transform: scale(1.1); border-color: #43b581;
            background: radial-gradient(circle, #ccffdd 0%, #ccffdd 30%, #81e6a5 30%, #81e6a5 60%, #43b581 60%, #43b581 85%, #2d7d5a 85%, #2d7d5a 100%);
        }

        .art-bubble h1 { color: white; font-size: 16px; text-align: center; text-shadow: 3px 3px 0px #000; pointer-events: none; }

        /* Style du bouton Galerie */
        nav { position: fixed; top: 20px; right: 20px; z-index: 10; }
        .btn-view { 
            background: #43b581; color: white; padding: 15px; border: 4px solid #fff; 
            font-family: 'Press Start 2P'; font-size: 10px; cursor: pointer;
            text-decoration: none; display: inline-block;
        }
        .btn-view:hover { background: #ff85a2; transform: scale(1.05); }

    </style>
</head>
<body id="main-body">

    <nav>
        <a href="https://discordapp.com/channels/1482338085382520925/1482796108756418642" target="_blank" class="btn-view">VOIR LA GALERIE DISCORD</a>
    </nav>

    <div class="art-bubble" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <h1>ART<br>CLOUD</h1>
        <input type="file" id="file-input" hidden accept="image/*">
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const body = document.getElementById('main-body');

        // --- CONFIGURATION ---
        const DISCORD_WEBHOOK_URL = "https://discordapp.com/api/webhooks/1482855411165167802/35fbNBbJ5N1Pj3HbE-FO5O4cROq9rAU23mgl_X_ketCOVg-jK_LHF1l96VPj8fha_gvW"; 

        window.addEventListener('dragover', (e) => { e.preventDefault(); body.classList.add('file-detected'); });
        window.addEventListener('dragleave', (e) => { if (!e.relatedTarget) body.classList.remove('file-detected'); });

        dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            body.classList.remove('file-detected');
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        document.getElementById('file-input').addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(files) {
            for (let file of files) {
                if (file.type.startsWith('image/')) {
                    const formData = new FormData();
                    formData.append('file', file);
                    
                    fetch(DISCORD_WEBHOOK_URL, {
                        method: 'POST',
                        body: formData
                    }).then(() => {
                        alert("Génial ! Ton dessin est maintenant dans la galerie Discord !");
                    }).catch(err => {
                        alert("Erreur lors de l'envoi.");
                    });
                }
            }
        }
    </script>
</body>
</html>
